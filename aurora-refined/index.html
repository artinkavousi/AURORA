<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, height=device-height, interactive-widget=resizes-content, shrink-to-fit=0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>Aurora Refined — WebGPU Liquid Instrument</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        position: relative;
        overflow: hidden;
        background-color: black;
      }

      #app-root {
        width: 100%;
        height: 100%;
        display: block;
        position: relative;
      }

      #loading-veil {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: radial-gradient(circle at 30% 30%, rgba(48, 68, 92, 0.75), rgba(12, 16, 22, 0.92));
        color: #dce3f3;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        opacity: 1;
        transition: opacity 0.8s ease;
        pointer-events: none;
      }

      #progress-track {
        width: 240px;
        height: 6px;
        background-color: rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        overflow: hidden;
      }

      #progress-value {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #68d5ff 0%, #c084fc 100%);
        transition: width 0.25s ease;
      }

      #error-message {
        max-width: 320px;
        text-align: center;
        font-size: 14px;
        letter-spacing: 0.01em;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="app-root">
      <div id="loading-veil">
        <div id="progress-track"><div id="progress-value"></div></div>
        <div id="error-message"></div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
